# Book settings
# Learn more at https://jupyterbook.org/customize/config.html

title: Earth Data Science and Machine Learning
author: Dhruv Balwada & Kara Lamb
logo: logo_class.png

# Only build files listed in _toc.yml. This keeps the standalone
# accessible_pilot/ mini-book out of the main book build; it is built and
# published separately (to /accessible/) by the deploy workflow.
only_build_toc_files: true

# Force re-execution of notebooks on each build.
# See https://jupyterbook.org/content/execute.html
execute:
  # CI re-executes notebooks on each build. Pure-compute + small-data notebooks
  # (core_python, sci_python, pandas) execute fine and stay output-free in the
  # repo (clean downloads). The xarray notebooks pull data over OPeNDAP/Zarr that
  # is slow/unreachable from CI runners, so they are excluded here and render from
  # their committed outputs instead (run them locally before committing).
  execute_notebooks: force
  timeout: 120
  exclude_patterns:
    - '*xarray*'      # OPeNDAP/Zarr data is slow/blocked from CI; render committed outputs
    - '*assignment*'  # student templates (empty answer cells) + heavy data (e.g. 322 MB IBTrACS); no need to execute
    - '*final_lec*'   # needs cartopy + xarray + data (not in CI); render committed outputs

# Define the name of the latex output file for PDF builds
latex:
  latex_documents:
    targetname: book.tex

# Add a bibtex file so that we can create citations
bibtex_bibfiles:
  - references.bib

# Information about where the book exists on the web
repository:
  url: https://github.com/earth-DS-ML/summer_2026  # Online location of your book
  #path_to_book: docs  # Optional path to your book, relative to the repository root
  #branch: master  # Which branch of the repository should be used when creating links (optional)

# Add GitHub buttons to your book
# See https://jupyterbook.org/customize/config.html#add-a-link-to-your-repository
html:
  use_issues_button: true
  use_repository_button: true
  # Force the page "Download source file" (.ipynb) button to save the file
  # instead of opening the raw JSON in a new tab.
  extra_footer: |
    <script>
    document.addEventListener("DOMContentLoaded", function () {
      document.querySelectorAll("a.btn-download-source-button").forEach(function (a) {
        a.setAttribute("download", "");
        a.removeAttribute("target");
      });
    });
    </script>

# Pin the footer copyright year so it doesn't auto-pick "build year"
sphinx:
  config:
    copyright: "2026, Dhruv Balwada & Kara Lamb"
    # Open all external links in a new browser tab
    myst_links_external_new_tab: true
